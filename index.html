<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>판다마켓</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
  <header>
    <nav>
        <a href="/index.html"><img src="/images/Property 1=lg@2x.png" alt="판다마켓 로고"></a>
        <a class="bt_login" href="/login.html">로그인</a>
    </nav>
  </header>
  <main>
    <section class="hero_bg">
      <div class="hero_content">
        <div class="hero_copy">
          <h1>일상의 모든 물건을<br>거래해 보세요</h1>
          <a href="/items.html"><span>구경하러 가기</span></a>
        </div>
        <img src="/images/Img_home_top.png" alt="판다마켓 메인 이미지">
      </div>
    </section>
    <section class="features">
      <article>
        <div class="features_box">
          <img src="/images/Img_home_01.png" alt="특징 인기상품 확인">
          <div class="features_copy">
            <p>Hot item</p>
            <h2>인기 상품을<br>확인해 보세요</h2>
            <p>가장 HOT한 중고거래 물품을 판다 마켓에서 확인해 보세요</p>
          </div>
        </div>
      </article>
      <article>
        <div class="features_box">
          <img src="/images/Img_home_02.png" alt="특징 구매상품 검색">
          <div class="features_copy">
            <p>Search</p>
            <h2>구매를 원하는<br>상품을 검색하세요</h2>
            <p>구매하고 싶은 물품은 검색해서 쉽게 찾아보세요</p>
          </div>
        </div>
      </article>
      <article>
        <div class="features_box">
          <img src="/images/Img_home_03.png" alt="특징 판매상품 등록">
          <div class="features_copy">
            <p>Register</p>
            <h2>판매를 원하는<br>상품을 등록하세요</h2>
            <p>어떤 물건이든 판매하고 싶은 상품을 쉽게 등록하세요</p>
          </div>
        </div>
      </article>
    </section>
    <section class="bot_bg">
      <div class="bot">
        <div class="bot_banner">
          <div class="bot_banner_copy">
            <h2>믿을 수 있는<br>판다마켓 중고 거래</h2>
          </div>
          <img src="/images/Img_home_bottom.png" alt="판다마켓 중고거래">
        </div>
      </div>
    </section>
  </main>
  <footer>
    <div class="foot_info">
      <p>©codeit - 2024</p>
      <p>
        <a href="/privacy.html">Policy</a>
        <a href="/faq.html">FAQ</a>
      </p>

        <a href="https://x.com/?lang=ko" target="_blank"><img src="/images/ic_twitter.svg" alt="트위터"></a>
        <a href="https://www.youtube.com/" target="_blank"><img src="/images/ic_youtube.svg" alt="유튜브"></a>
        <a href="https://www.instagram.com/" target="_blank"><img src="/images/ic_instagram.svg" alt="인스타그램"></a>
